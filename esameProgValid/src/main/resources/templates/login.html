<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script>
    function mostraRecuperoPassword() {
      // Mostra i campi per il recupero password
      document.getElementById("recuperoPassword").style.display = "block";
    }
  </script>
</head>
<body>
<h2>Login</h2>
<form action="/credenziali" method="post">
  <div>
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required>
  </div>
  <div>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>
  </div>
  <div>
    <label for="ruolo">Ruolo:</label>
    <input type="text" id="ruolo" name="ruolo" required>
  </div>
  <button type="submit">Accedi</button>
</form>

<br>
<a href="javascript:void(0);" onclick="mostraRecuperoPassword()">Password dimenticata?</a>

<!-- Sezione per il recupero password, inizialmente nascosta -->
<form action="/recupero" method="post">
  <div id="recuperoPassword" style="display:none;">
    <label for="emailRecupero">Inserisci la tua email:</label>
    <input type="emailRecupero" id="emailRecupero" name="emailRecupero" required>
    <button type="submit">Recupera Password</button>
  </div>
</form>>
</body>
</html>
