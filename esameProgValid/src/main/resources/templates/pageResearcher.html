<!DOCTYPE html>
<html lang="en">
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<br>
<h2>List Tasks of researcher</h2>
<br>

<h1 th:text="${person.getFirstName()}"></h1>
<h1 th:text="${person.getLastName()}"></h1>

<table border="1">
    <thead>
    <tr>
        <th>Name task</th>
        <th>Scientific researcher name</th>
        <th>Researchers</th>
        <th>State</th>
        <th>Start date</th>
        <th>End date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t: ${listTasks}">
        <td th:text="${t.getNameTask()}"> <b></b></td>
        <td th:text="${t.getWorkPackageAssociation().getProjectAssociation().getScientificManager().getFirstName()}"></td>
        <td>
            <ul>
                <li th:each="researcher : ${t.getResearchers()}" th:text="${researcher.getFirstName()}"></li>
            </ul>
        </td>
        <td th:text="${t.getState()}"></td>
        <td th:text="${t.getStartDate()}"></td>
        <td th:text="${t.getEndDate()}"></td>
    </tr>
    </tbody>
</table>

<br>

<br>

<h1>Set Free Hours</h1>
<form th:action="@{/setHoursResearcher}" method="post">
    <div>
        <label for="workingHours">Set free hours:</label>
        <input type="number" id="workingHours" name="freehours" min="0" step="1" th:value="${person.free_hours}" />
    </div>

    <input type="hidden" name="ResearcherID" th:value="${person.id}" />
    <div>
        <button type="submit">Set Free Hours</button>
    </div>
</form>

<br>

<a href="/"> Go to the login page </a>

<br>

<h2 th:text="${message}"></h2>


</body>
</html>
