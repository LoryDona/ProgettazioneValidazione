<!DOCTYPE html>
<html lang="it">
<head>
  <!DOCTYPE html>
  <html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu a Tendina con Pulsante</title>
  </head>
  <body>
  <h1>Seleziona un Report</h1>
  <form action="/submitReport" method="POST">
    <!-- Campo Email -->
    <label for="email">Inserisci la tua email:</label>
    <br>
    <input type="email" id="email" name="email" required>
    <br><br>

    <!-- Menu a Tendina -->
    <label for="report">Seleziona un report:</label>
    <br>
    <select name="report" id="report" required>
      <option value="reportA">Report A</option>
      <option value="reportB">Report B</option>
      <option value="reportC">Report C</option>
    </select>
    <br><br>

    <!-- Pulsante Invia -->
    <button type="submit">Invia</button>
  </form>
  </body>
  </html>
