<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>Menu a Tendina con Pulsante</title>
</head>
<body>
<h1>Seleziona un Report</h1>
<form action="/submitReport" method="POST">
  <!-- Campo Email -->
  <label for="email">Inserisci la tua email:</label>
  <br>
  <input type="email" id="email" name="email" required>
  <br><br>

  <!-- Menu a Tendina -->
  <label for="report">Seleziona un report:</label>
  <br>
  <select name="report" id="report" required>
    <!-- Le opzioni vengono generate dinamicamente -->
    <th:block th:each="reportName : ${reportNames}">
      <option th:value="${reportName}" th:text="${reportName}"></option>
    </th:block>
  </select>
  <br><br>

  <!-- Pulsante Invia -->
  <button type="submit">Invia</button>
</form>
</body>
</html>
