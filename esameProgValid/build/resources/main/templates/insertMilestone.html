<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create New Milestone</title>
    <script>
        function validateForm() {
            // Ottieni il campo dei WorkPackage
            var workPackageSelect = document.getElementById("workPackages");

            // Controlla se è selezionato almeno un work package che non è vuoto
            var selectedOptions = Array.from(workPackageSelect.selectedOptions);
            var isValid = selectedOptions.some(option => option.value !== "");  // Verifica che almeno una opzione abbia un valore diverso da ""

            if (!isValid) {
                // Mostra un alert se non è selezionato alcun work package valido
                alert("Per favore, seleziona almeno un Work Package. Se non esistono prima creane uno!");
                return false;  // Impedisce l'invio del form
            }
            return true;  // Permette l'invio del form
        }
    </script>
</head>
<body>
<form th:action="@{/CreateMilestonePage}" method="post" onsubmit="return validateForm()">

    <!-- Nome della Milestone -->
    <div>
        <label for="nameMilestone">Name Milestone:</label>
        <input type="text" id="nameMilestone" name="nameMilestone" required>
    </div>

    <!-- Descrizione della Milestone -->
    <div>
        <label for="descriptionMilestone">Description:</label>
        <textarea id="descriptionMilestone" name="descriptionMilestone" required></textarea>
    </div>

    <!-- Stato della Milestone -->
    <div>
        <label for="state">Stato della Milestone:</label>
        <select id="state" name="state" required>
            <option value="" disabled selected>Seleziona lo Stato</option>
            <option value="not_started">Da Iniziare</option>
            <option value="in_progress">In Corso</option>
            <option value="completed">Completato</option>
            <option value="late">In Ritardo</option>
        </select>
    </div>

    <!-- Selezione dei WorkPackage -->
    <div>
        <label for="workPackages">Work Package:</label>
        <select id="workPackages" name="workPackageNames" multiple required>
            <option value="" disabled selected>Seleziona uno o più Work Package</option>
            <th:block th:each="wp : ${listWorkPackage}">
                <option th:value="${wp.nameWorkPackage}" th:text="${wp.nameWorkPackage}"></option>
            </th:block>
        </select>
    </div>

    <!-- Data di inizio -->
    <div>
        <label for="startDate">Start Date:</label>
        <input type="date" id="startDate" name="startDate" required />
    </div>

    <!-- Data di fine -->
    <div>
        <label for="endDate">End Date:</label>
        <input type="date" id="endDate" name="endDate" required />
    </div>

    <!-- Nome del progetto (invisibile all'utente) -->
    <input type="hidden" name="nameProject" th:value="${project.nameProject}" />

    <!-- Pulsante per creare la Milestone -->
    <div>
        <button type="submit">Create Milestone</button>
    </div>
    <br>
    <a href="javascript:history.back()">Go Back</a>
</form>
</body>
</html>
