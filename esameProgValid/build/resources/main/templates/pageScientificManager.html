<!DOCTYPE html>
<html lang="en">
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scientific manage page</title>
</head>
<body>

<h1 th:text="${person.getFirstName()}"></h1>
<h1 th:text="${person.getLastName()}"></h1>

<br>
<a th:href="@{/listProjectScientificManager(IDScientificManager=${person.getId()})}"> List projects </a>
<br>

<h1>Set Free Hours</h1>
<form th:action="@{/setHours}" method="post">
    <div>
        <label for="workingHours">Set free hours:</label>
        <input type="number" id="workingHours" name="freehours" min="0" step="1" th:value="${person.free_hours}" />
    </div>

    <input type="hidden" name="scientificManagerID" th:value="${person.id}" />
    <div>
        <button type="submit">Set Free Hours</button>
    </div>
</form>

<br>

<h2 th:text="${message}"></h2>

<br>
<h2>List work packages</h2>
<br>

<table border="1">
    <thead>
    <tr>
        <th>Name</th>
        <th>Project association name</th>
        <th>Description</th>
        <th>Start date</th>
        <th>End date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="w: ${listWorkPackage}">
        <td th:text="${w.getNameWorkPackage()}"> <b></b></td>
        <td th:text="${w.getProjectAssociation().getNameProject()}"></td>
        <td th:text="${w.getDescription()}"></td>
        <td th:text="${w.getStartDate()}"></td>
        <td th:text="${w.getEndDate()}"></td>
    </tr>
    </tbody>
</table>

<br>

<a href="/"> Go to the login page </a>


<script>
    window.onload = function() {
        // Controlla se la pagina è già stata ricaricata
        if (!sessionStorage.getItem('pageReloaded')) {
            sessionStorage.setItem('pageReloaded', 'true'); // Imposta che è stata ricaricata
            location.reload(true); // Ricarica la pagina
        }
    };
</script>

<br>

</body>
</html>
