<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project</title>
</head>
<body>

<table border="1">
    <thead>
    <tr>
        <th>Name Project</th>
        <th>Administrator</th>
        <th>ScientificManager</th>
        <th>Add work package</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="project: ${projects}">
        <td th:text="${project.nameProject}"> </td>
        <td th:text="${project.administrator.firstName}"> </td>
        <td th:text="${project.ScientificManager.firstName}"> </td>
        <td><a th:href="@{/createWorkPackage(NameProject=${project.nameProject})}">create work package for this project</a></td>
    </tr>
    </tbody>
</table>

<br>

<div>
    <!-- Verifica se username e password sono settati -->
    <div th:if="${username != null and password != null}">
        <!-- Mostra il form -->
        <form th:action="@{/mainPage}" method="post">
            <input type="hidden" name="username" th:value="${username}" />
            <input type="hidden" name="password" th:value="${password}" />
            <button type="submit">Return to the Main page</button>
        </form>
    </div>

    <!-- Mostra il link Go Back se username e password non sono settati -->
    <div th:if="${username == null or password == null}">
        <a href="javascript:history.back()">Go Back</a>
    </div>
</div>


<br>
<a href="/"> Go to the login page </a>

</body>
</html>
