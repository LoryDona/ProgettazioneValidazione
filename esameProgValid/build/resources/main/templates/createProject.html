<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Create New Project</title>
</head>
<body>

<form action="/createProject" method="post">

  <div>
    <label for="nameProject">Nome del Progetto:</label>
    <input type="text" id="nameProject" name="nameProject" required />
  </div>

  <div>
    <label for="administrator">Amministratore:</label>
    <input type="text" id="administrator" name="administratorName" th:value="${administrator.firstName}" readonly />

    <input type="hidden" name="administrator.getId()" th:value="${administrator.getId()}" />
  </div>

  <div>
    <label for="scientificManager">Responsabile Scientifico:</label>
    <select id="scientificManager" name="scientificManager.getId()" required>
      <option value="" disabled selected>Seleziona un Responsabile Scientifico</option>
      <th:block th:each="manager : ${scientificManager}">
        <option th:value="${manager.getId()}" th:text="${manager.getFirstName()}">Responsabile Scientifico</option>
      </th:block>
    </select>
  </div>

  <div>
    <label for="state">Stato del Progetto:</label>
    <select id="state" name="state" required>
      <option value="" disabled selected>Seleziona lo Stato</option>
      <option value="in_planning">In Pianificazione</option>
      <option value="in_progress">In Corso</option>
      <option value="completed">Completato</option>
      <option value="on_hold">In Sospeso</option>
    </select>
  </div>

  <div>
    <label for="startDate">Data di Inizio:</label>
    <input type="date" id="startDate" name="startDate" required />
  </div>

  <div>
    <label for="endDate">Data di Fine:</label>
    <input type="date" id="endDate" name="endDate" required />
  </div>

  <div>
    <label for="budget">Budget (€):</label>
    <input type="number" id="budget" name="budget" min="0" step="0.01" required />
  </div>

  <div>
    <label for="workingHours">Ore lavorative previste dal responsabile scientifico:</label>
    <input type="number" id="workingHours" name="workingHours" min="1" step="1" required />
  </div>

  <div>
    <button type="submit">Crea Progetto</button>
  </div>
</form>

</body>
</html>
