<!DOCTYPE html>
<html lang="en">
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administrator page</title>
</head>
<body>

<h1 th:text="${person.getFirstName()}"></h1>
<h1 th:text="${person.getLastName()}"></h1>

<br>
<a th:href="@{/listProjectResearcher(IDResearcher=${person.getId()})}"> List projects </a>

<br>

<h1>Set Free Hours</h1>
<form th:action="@{/setHours}" method="post">
    <div>
        <label for="workingHours">Set free hours:</label>
        <input type="number" id="workingHours" name="freehours" min="0" step="1" th:value="${person.free_hours}" />
    </div>

    <input type="hidden" name="ResearcherID" th:value="${person.id}" />
    <div>
        <button type="submit">Set Free Hours</button>
    </div>
</form>

<br>
<a href="/"> Go to the login page </a>

<br>

<h2 th:text="${message}"></h2>

</body>
</html>
